services:
  rightflow-autopilot:
    image: ${ALIBABA_ACR_IMAGE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8080"
      QWEN_API_KEY: ${QWEN_API_KEY}
      QWEN_MODEL: qwen3.7-plus
      NEXT_PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/rightflow-autopilot').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
